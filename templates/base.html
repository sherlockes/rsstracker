<!DOCTYPE html>
<html lang="{{ 'en' if i18n.nav.settings == 'Settings' else 'es' }}" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}RSS Tracker → Telegram{% endblock %}</title>
  <meta name="description" content="{{ i18n.config.telegram_bot_desc }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="/static/style.css" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark glass-nav sticky-top">
  <div class="container-xl">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">
      <span class="brand-icon"><i class="bi bi-rss-fill"></i></span>
      <span>RSS<span class="text-accent">Tracker</span></span>
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-1 align-items-lg-center">
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">
            <i class="bi bi-grid-fill me-1"></i>{{ i18n.nav.dashboard }}
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/feeds/new' in request.url.path %}active{% endif %}" href="/feeds/new">
            <i class="bi bi-plus-circle-fill me-1"></i>{{ i18n.nav.add_feed }}
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/config' %}active{% endif %}" href="/config">
            <i class="bi bi-gear-fill me-1"></i>{{ i18n.nav.settings }}
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/logs' %}active{% endif %}" href="/logs">
            <i class="bi bi-terminal-fill me-1"></i>{{ i18n.nav.logs }}
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Main content -->
<main class="container-xl py-4">
  {% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer class="footer-bar text-center py-3 mt-auto">
  <small class="text-muted">
    RSS Tracker → Telegram &mdash; <span id="clock"></span>
  </small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Live clock
  function updateClock() {
    document.getElementById('clock').textContent = new Date().toLocaleString('es-ES');
  }
  updateClock();
  setInterval(updateClock, 1000);
</script>
{% block scripts %}{% endblock %}
</body>
</html>
