services:
  rsstracker:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: rsstracker
    restart: unless-stopped
    ports:
      # 🔒 Atados exclusivamente a tu IP de ZeroTier:
      - "192.168.191.220:8765:8000" 
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Europe/Madrid
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - proxy

networks:
  proxy:
    external: true
